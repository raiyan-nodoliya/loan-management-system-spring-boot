<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanHub - Loan Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/loanhub.css}">
    <link rel="stylesheet" th:href="@{/css/customer_dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/customerNavbarSection :: customerNavbarSection}"></div>

<section class="db-hero">
    <div class="db-hero-inner">
        <h1 class="db-hero-title">Apply for Loan</h1>
        <p class="db-hero-sub">Step 2 of 4: Loan Details</p>
    </div>
</section>

<div class="db-wrap">
    <div class="db-stepbar">
        <div class="db-step"><span class="db-step-dot">1</span> Personal Details</div>
        <div class="db-step-line"></div>
        <div class="db-step active"><span class="db-step-dot">2</span> Loan Details</div>
        <div class="db-step-line muted"></div>
        <div class="db-step"><span class="db-step-dot">3</span> Income & Employment</div>
        <div class="db-step-line muted"></div>
        <div class="db-step"><span class="db-step-dot">4</span> Documents & Submit</div>
    </div>

    <div class="db-card db-card-pad" style="max-width: 640px; margin: 12px auto 0;">
        <form th:action="@{/apply/step2_loan}" method="post">

            <div class="db-field" style="margin-bottom: 20px;">
                <label>PAN Card Number</label>
                <input class="db-input"
                       name="panNumber"
                       type="text"
                       placeholder="ABCDE1234F"
                       required
                       maxlength="10"
                       pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
                       style="text-transform: uppercase;"
                       th:value="${customer != null ? customer.panCard : ''}" />
                <small style="color: #64748b; font-size: 11px;">10-digit Alphanumeric PAN is mandatory for CIBIL verification.</small>
            </div>

            <div class="db-field">
                <label>Loan Type</label>
                <select class="db-select" name="loanTypeId" id="loanTypeSelect" required onchange="updateLoanRules()">
                    <option value="">-- Select --</option>
                    <th:block th:each="x : ${loanTypes}">
                        <option th:value="${x.loanTypeId}"
                                th:text="${x.loanTypeName}"
                                th:data-tenures="${#strings.arrayJoin(x.tenures.![tenureMonths], ',')}"
                                th:data-max="${x.maxAmount}"
                                th:selected="${loanTypeId != null and loanTypeId == x.loanTypeId}">
                        </option>
                    </th:block>
                </select>
                <small class="db-err" th:if="${loanTypeIdError}" th:text="${loanTypeIdError}"></small>
            </div>

            <div class="db-form-grid-2 db-mt-14">
                <div class="db-field">
                    <label>Loan Amount (₹)</label>
                    <input class="db-input"
                           id="amountInput"
                           name="amountRequested"
                           type="number"
                           step="500"
                           placeholder="Enter loan amount"
                           th:value="${amountRequested}"
                           th:classappend="${amountRequestedError != null} ? 'input-error' : ''" />

                    <small id="amountHint" style="color: #64748b; font-size: 11px; font-weight: 500; display: block; margin-top: 4px;">
                        <span th:if="${amountRequestedError == null}">Please select loan type to see limit</span>
                    </small>

                    <small class="db-err" id="serverError" th:if="${amountRequestedError}"
                           th:text="${amountRequestedError}" style="color: #dc2626;"></small>
                </div>

                <div class="db-field">
                    <label>Select Tenure (Months)</label>
                    <select class="db-select" name="tenureMonthsRequested" id="tenureSelect" required>
                        <option value="">-- Select Loan Type First --</option>
                    </select>
                    <small class="db-err" th:if="${tenureMonthsRequestedError}" th:text="${tenureMonthsRequestedError}"></small>
                </div>
            </div>

            <div class="db-field db-mt-14">
                <label>Purpose</label>
                <textarea class="db-textarea"
                          name="purpose"
                          placeholder="Why do you need this loan?"
                          th:text="${purpose}"></textarea>
                <small class="db-err" th:if="${purposeError}" th:text="${purposeError}"></small>
            </div>

            <div class="db-form-actions">
                <a class="db-btn" th:href="@{/apply/step1_personal}">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>
                <button class="db-btn db-btn-yellow" type="submit">
                    Next <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footerSection}"></div>

<script th:src="@{/js/loanhub.js}"></script>

<script>
    function updateLoanRules() {
    const loanSelect = document.getElementById('loanTypeSelect');
    const tenureSelect = document.getElementById('tenureSelect');
    const amountInput = document.getElementById('amountInput');
    const hint = document.getElementById('amountHint');
    const serverErr = document.getElementById('serverError');

    const selectedOption = loanSelect.options[loanSelect.selectedIndex];

    // Reset basics
    if (serverErr) serverErr.style.display = 'none'; // Purana server error chhupa do
    hint.style.color = "#64748b";

    if (!selectedOption.value) {
        hint.innerText = "Please select loan type to see limit";
        return;
    }

    // 1. Update Tenure (Same as before)
    const tenuresStr = selectedOption.getAttribute('data-tenures');
    tenureSelect.innerHTML = '<option value="">-- Select Tenure --</option>';
    if (tenuresStr) {
        tenuresStr.split(',').forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.trim();
            opt.text = m.trim() + " Months";
            tenureSelect.appendChild(opt);
        });
    }

    // 2. Update Placeholder & Hint dynamically
    const maxAmt = selectedOption.getAttribute('data-max');
    if (maxAmt) {
        const formattedMax = parseFloat(maxAmt).toLocaleString('en-IN');
        amountInput.setAttribute('max', maxAmt);
        amountInput.placeholder = "Max allowed: ₹" + formattedMax;
        hint.innerText = "Note: For this loan, max amount is ₹" + formattedMax + " only.";
    }
}

// Real-time validation without Alert
document.getElementById('amountInput').addEventListener('input', function() {
    const loanSelect = document.getElementById('loanTypeSelect');
    const selectedOption = loanSelect.options[loanSelect.selectedIndex];
    const max = parseFloat(selectedOption.getAttribute('data-max'));
    const currentVal = parseFloat(this.value);
    const hint = document.getElementById('amountHint');

    if (max && currentVal > max) {
        hint.innerText = "Error: Max amount is ₹" + max.toLocaleString('en-IN') + " only (Admin Limit).";
        hint.style.color = "#dc2626"; // Red color for error
        this.style.border = "1px solid #dc2626";
    } else if (max) {
        hint.innerText = "Note: Max amount is ₹" + max.toLocaleString('en-IN') + " only.";
        hint.style.color = "#64748b"; // Back to normal
        this.style.border = "";
    }
});
</script>
</body>
</html>
